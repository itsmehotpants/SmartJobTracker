name: Smart Job Tracker CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 🔨 Build with Maven
        run: mvn clean compile -B

      - name: 🧪 Run Tests
        run: mvn test -B

      - name: 📊 Build JAR
        run: mvn package -DskipTests -B

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-job-tracker-jar
          path: target/*.jar
          retention-days: 7

  docker:
    name: Docker Build
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: docker build -t smart-job-tracker:latest .

      - name: ✅ Verify Docker image
        run: docker images smart-job-tracker:latest
