# ===================================================================
# Smart Job Tracker — Production Configuration
# ===================================================================

# --- Database (MySQL — Production) ---
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/jobtracker?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# --- JWT (Use environment variable in production!) ---
jwt.secret=${JWT_SECRET:U21hcnRKb2JUcmFja2VyMjAyNFN1cGVyU2VjcmV0S2V5Rm9ySFMyNTZBbGdvcml0aG1UaGF0SXNBZE1pbmltdW0yNTZCaXRz}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# --- Actuator (Restricted in production) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# --- Logging ---
logging.level.root=WARN
logging.level.com.jobtracker.demo=INFO
logging.level.org.springframework.security=WARN

# --- SQL Init ---
spring.sql.init.mode=never
