# ===================================================================
# Smart Job Tracker — Development Configuration
# ===================================================================

# --- Server ---
server.port=${PORT:8080}
spring.application.name=Smart Job Tracker

# --- Database (H2 In-Memory — Development) ---
spring.datasource.url=jdbc:h2:mem:jobtracker
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- JWT Configuration ---
jwt.secret=U21hcnRKb2JUcmFja2VyMjAyNFN1cGVyU2VjcmV0S2V5Rm9ySFMyNTZBbGdvcml0aG1UaGF0SXNBZE1pbmltdW0yNTZCaXRz
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# --- Spring Security ---
spring.security.filter.order=10

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Smart Job Tracker
info.app.version=1.0.0
info.app.description=Production-ready SaaS backend for job tracking

# --- OpenAPI / Swagger ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# --- Logging ---
logging.level.root=INFO
logging.level.com.jobtracker.demo=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# --- SQL Init ---
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
