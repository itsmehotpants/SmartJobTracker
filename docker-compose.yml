version: '3.8'

services:
  # ---- MySQL Database ----
  mysql:
    image: mysql:8.0
    container_name: jobtracker-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: jobtracker
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USER:-jobtracker}
      MYSQL_PASSWORD: ${DB_PASSWORD:-jobtracker123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - jobtracker-network

  # ---- Spring Boot Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobtracker-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mysql://mysql:3306/jobtracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DATABASE_USERNAME: ${DB_USER:-jobtracker}
      DATABASE_PASSWORD: ${DB_PASSWORD:-jobtracker123}
      JWT_SECRET: ${JWT_SECRET:-SmartJobTracker2024SuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - jobtracker-network

volumes:
  mysql_data:
    driver: local

networks:
  jobtracker-network:
    driver: bridge
